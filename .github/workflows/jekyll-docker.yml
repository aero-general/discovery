name: Validate and deploy discovery portal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required application files
        shell: bash
        run: |
          set -euo pipefail
          test -e .nojekyll || { echo "Missing required file: .nojekyll"; exit 1; }
          required=(
            index.html
            assets/adaptive-wizard.css
            assets/adaptive-questions.js
            assets/adaptive-wizard.js
            assets/runtime-fixes.js
            assets/skunkie.svg
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Missing or empty required file: $file"; exit 1; }
          done
          grep -qi '<!DOCTYPE html>' index.html
          grep -qi '<title>Property Transformation Discovery Portal</title>' index.html

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check assets/adaptive-questions.js
          node --check assets/adaptive-wizard.js
          node --check assets/runtime-fixes.js

      - name: Validate local asset references
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class AssetParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs = []
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  key = 'href' if tag == 'link' else 'src' if tag in {'script', 'img'} else None
                  if key and values.get(key):
                      self.refs.append(values[key])

          parser = AssetParser()
          parser.feed(Path('index.html').read_text(encoding='utf-8'))
          missing = []
          for ref in parser.refs:
              if ref.startswith(('http://', 'https://', 'data:', '#')):
                  continue
              path = Path(ref.split('?', 1)[0].lstrip('/'))
              if not path.exists():
                  missing.append(ref)
          if missing:
              raise SystemExit('Missing referenced assets: ' + ', '.join(missing))
          print(f'Validated {len(parser.refs)} asset references')
          PY

      - name: Build static publish directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html .nojekyll LICENSE _site/
          cp -R assets _site/assets
          test -s _site/index.html
          test -s _site/assets/adaptive-wizard.js
          find _site -type f -print | sort

      - name: Upload validation artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: discovery-portal-preview
          path: _site
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static publish directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html .nojekyll LICENSE _site/
          cp -R assets _site/assets

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
