name: Validate and deploy discovery portal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required application files
        shell: bash
        run: |
          set -euo pipefail
          test -e .nojekyll || { echo "Missing required file: .nojekyll"; exit 1; }
          required=(
            index.html
            lighthouserc.json
            lighthouserc-desktop.json
            assets/adaptive-wizard.css
            assets/adaptive-questions.js
            assets/adaptive-wizard.js
            assets/runtime-fixes.js
            assets/product-landing.css
            assets/product-landing.js
            assets/ux-enhancements.css
            assets/ux-enhancements.js
            assets/aero-cgi-sprite.webp
            assets/aero-cgi.css
            assets/aero-cgi.js
            assets/aero-agent.css
            assets/aero-agent.js
            assets/aero-intents.js
            assets/favicon.svg
            knowledge/aero-knowledge.json
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Missing or empty required file: $file"; exit 1; }
          done
          grep -qi '<!DOCTYPE html>' index.html
          grep -qi '<title>Aero Discovery | Property Transformation</title>' index.html
          grep -q 'id="productLanding"' index.html
          grep -q 'data-start-assessment' index.html
          grep -q 'id="assessmentApp"' index.html
          grep -q 'Aero Discovery Agent' index.html
          grep -q 'class="skip-link"' index.html
          grep -q 'role="progressbar"' index.html

      - name: Validate JavaScript and knowledge syntax
        shell: bash
        run: |
          set -euo pipefail
          find assets -maxdepth 1 -type f -name '*.js' -print0 | sort -z | xargs -0 -n1 node --check
          python3 -m json.tool knowledge/aero-knowledge.json >/dev/null
          python3 -m json.tool lighthouserc.json >/dev/null
          python3 -m json.tool lighthouserc-desktop.json >/dev/null
          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('knowledge/aero-knowledge.json').read_text())
          topics=data.get('topics',[])
          assert len(topics) >= 10, 'Aero knowledge store must include at least ten topics'
          ids=[topic.get('id') for topic in topics]
          assert len(ids)==len(set(ids)), 'Knowledge topic IDs must be unique'
          for topic in topics:
              assert topic.get('title') and topic.get('summary') and topic.get('keywords'), f'Incomplete topic: {topic}'
          print(f'Validated {len(topics)} Aero knowledge topics')
          PY

      - name: Validate local asset references
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          class AssetParser(HTMLParser):
              def __init__(self): super().__init__(); self.refs=[]
              def handle_starttag(self,tag,attrs):
                  values=dict(attrs); key='href' if tag=='link' else 'src' if tag in {'script','img'} else None
                  if key and values.get(key): self.refs.append(values[key])
          parser=AssetParser(); parser.feed(Path('index.html').read_text(encoding='utf-8'))
          missing=[]
          for ref in parser.refs:
              if ref.startswith(('http://','https://','data:','#')): continue
              path=Path(ref.split('?',1)[0].lstrip('/'))
              if not path.exists(): missing.append(ref)
          if missing: raise SystemExit('Missing referenced assets: '+', '.join(missing))
          print(f'Validated {len(parser.refs)} static HTML asset references')
          PY
          grep -q "assets/aero-cgi.css" assets/runtime-fixes.js
          grep -q "assets/aero-cgi.js" assets/runtime-fixes.js
          grep -q "assets/aero-intents.js" assets/runtime-fixes.js
          grep -q "assets/aero-agent.js" assets/runtime-fixes.js
          grep -q "knowledge/aero-knowledge.json" assets/aero-intents.js

      - name: Build static publish directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html .nojekyll LICENSE _site/
          cp -R assets _site/assets
          cp -R knowledge _site/knowledge
          test -s _site/index.html
          test -s _site/assets/adaptive-wizard.js
          test -s _site/assets/product-landing.js
          test -s _site/assets/ux-enhancements.js
          test -s _site/assets/aero-cgi-sprite.webp
          test -s _site/assets/aero-agent.js
          test -s _site/knowledge/aero-knowledge.json
          find _site -type f -print | sort

      - name: Upload validation artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: discovery-portal-preview
          path: _site
          if-no-files-found: error
          retention-days: 7

  lighthouse:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build static audit directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html .nojekyll LICENSE _site/
          cp -R assets _site/assets
          cp -R knowledge _site/knowledge
      - name: Start local static server
        shell: bash
        run: |
          python3 -m http.server 4173 --directory _site >/tmp/aero-http.log 2>&1 &
          echo $! > /tmp/aero-http.pid
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/aero-http.log
          exit 1
      - name: Run mobile Chrome Lighthouse CI
        shell: bash
        run: npx --yes @lhci/cli@0.14.0 autorun --config=./lighthouserc.json
      - name: Run desktop Chrome Lighthouse CI
        shell: bash
        run: npx --yes @lhci/cli@0.14.0 autorun --config=./lighthouserc-desktop.json
      - name: Print Lighthouse score summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          for profile in ('mobile','desktop'):
              reports=sorted((Path('.lighthouseci')/profile).glob('lhr-*.json'))
              if not reports:
                  print(f'{profile}: no report found')
                  continue
              rows=[]
              for report in reports:
                  data=json.loads(report.read_text())
                  cats=data['categories']
                  audits=data['audits']
                  rows.append({
                      'performance': round(cats['performance']['score']*100),
                      'accessibility': round(cats['accessibility']['score']*100),
                      'best_practices': round(cats['best-practices']['score']*100),
                      'seo': round(cats['seo']['score']*100),
                      'lcp_ms': round(audits['largest-contentful-paint']['numericValue']),
                      'cls': round(audits['cumulative-layout-shift']['numericValue'],3),
                      'tbt_ms': round(audits['total-blocking-time']['numericValue'])
                  })
              keys=rows[0].keys()
              median={key: sorted(row[key] for row in rows)[len(rows)//2] for key in keys}
              print(f"LIGHTHOUSE {profile.upper()}: {median}")
          PY
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: warn
          retention-days: 14

  deploy:
    if: github.event_name != 'pull_request'
    needs: [validate, lighthouse]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build static publish directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html .nojekyll LICENSE _site/
          cp -R assets _site/assets
          cp -R knowledge _site/knowledge
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4